[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "intellinotify-env"
version = "0.1.0"
description = "IntelliNotify OpenEnv security environment"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastapi",
    "uvicorn",
    "openenv-core>=0.2.0",
    "pydantic",
    "requests",
    "openai",
]

[project.scripts]
# This defines the "server" command the grader is looking for
server = "server.app:main"

[tool.setuptools]
packages = ["server"]
