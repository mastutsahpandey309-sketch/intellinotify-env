spec_version: 1
name: intellinotify
type: space
runtime: fastapi
app: app:app
port: 7860

description: "A mobile OS notification security environment where an agent triages phone notifications to identify threats like phishing, financial fraud, and malware."

maintainers:
  - "IntelliNotify Team"

tags:
  - security
  - classification
  - real-world
  - openenv

tasks:
  - id: "task_1_easy_blatant_scam"
    name: "Task 1: Blatant Scam"
    description: "Identify an obvious spam SMS among normal notifications."
    difficulty: "easy"
    grader: "graders.security_grader:grade_action"

  - id: "task_2_medium_productivity_vs_security"
    name: "Task 2: Productivity vs. Security"
    description: "Prioritize a phishing link over an urgent work email."
    difficulty: "medium"
    grader: "graders.security_grader:grade_action"

  - id: "task_3_hard_multi_vector"
    name: "Task 3: Multi-Vector Financial Attack"
    description: "Detect coordinated UPI fraud via clipboard and OTP correlation."
    difficulty: "hard"
    grader: "graders.security_grader:grade_action"

  - id: "task_4_medium_fake_bank_alert"
    name: "Task 4: Fake Bank Alert"
    description: "Identify social-engineering SMS impersonating a bank."
    difficulty: "medium"
    grader: "graders.security_grader:grade_action"

  - id: "task_5_hard_malware_install"
    name: "Task 5: Malware Install Trap"
    description: "Detect a malicious APK install disguised as a streaming app."
    difficulty: "hard"
    grader: "graders.security_grader:grade_action"
